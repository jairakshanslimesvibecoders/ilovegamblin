<!DOCTYPE html>
<html>
<head>
  <title>Pack Cards Game</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1020;
      color: white;
      text-align: center;
    }

    .card {
      border: 2px solid #555;
      border-radius: 10px;
      padding: 10px;
      margin: 5px;
      display: inline-block;
      width: 120px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .common { border-color: gray; }
    .rare { border-color: cyan; }
    .epic { border-color: purple; }
    .legendary { border-color: gold; }
    .mythic { border-color: orange; }
  </style>
</head>
<body>

<h1>🎴 Pack Cards Game</h1>
<h2>Coins: <span id="coins">1000</span></h2>

<button onclick="openPack('normal')">Open Pack (100)</button>
<button onclick="openPack('mythic')">Open Mythic Pack (500)</button>

<h2 id="result"></h2>

<h2>📦 Inventory</h2>
<div id="inventory"></div>

<script>
let save = JSON.parse(localStorage.getItem("cardGame")) || {
  coins: 1000,
  inventory: []
};

function saveGame() {
  localStorage.setItem("cardGame", JSON.stringify(save));
}

function updateUI() {
  document.getElementById("coins").innerText = save.coins;

  let inv = document.getElementById("inventory");
  inv.innerHTML = "";

  save.inventory.forEach((card, index) => {
    let div = document.createElement("div");
    div.className = "card " + card.rarity;

    div.innerHTML = `
      <h4>${card.name}</h4>
      <p>${card.rarity}</p>
      <p>Value: ${card.value}</p>
      <button onclick="sellCard(${index})">Sell</button>
    `;

    inv.appendChild(div);
  });
}

function sellCard(i) {
  save.coins += save.inventory[i].value;
  save.inventory.splice(i, 1);
  saveGame();
  updateUI();
}

function getCard(packType) {
  let r = Math.random() * 100;

  if (packType === "normal") {
    if (r < 0.1) return makeCard("Legendary", 5000);
    if (r < 2.1) return makeCard("Epic", 500);
    if (r < 20.1) return makeCard("Rare", 150);
    return makeCard("Common", 70);
  }

  if (r < 0.05) return makeCard("Mythic", 20000);
  if (r < 0.25) return makeCard("Legendary", 7000);
  if (r < 2.25) return makeCard("Epic", 2000);
  if (r < 20.25) return makeCard("Rare", 800);
  return makeCard("Common", 300);
}

function makeCard(rarity, value) {
  const names = {
    Common: ["Slime", "Rat", "Stick"],
    Rare: ["Knight", "Wolf", "Archer"],
    Epic: ["Dragon", "Wizard", "Titan"],
    Legendary: ["Phoenix", "Leviathan", "Storm King"],
    Mythic: ["Void God", "Time Breaker", "Celestial"]
  };

  let pool = names[rarity];
  let name = pool[Math.floor(Math.random() * pool.length)];

  return { name, rarity, value };
}

function openPack(type) {
  let cost = type === "normal" ? 100 : 500;

  if (save.coins < cost) {
    alert("Not enough coins!");
    return;
  }

  save.coins -= cost;

  // animation
  let resultText = document.getElementById("result");
  let cycle = ["Common", "Rare", "Epic", "Legendary", "Mythic"];
  let i = 0;

  let anim = setInterval(() => {
    resultText.innerText = "Opening... " + cycle[i % cycle.length];
    i++;
  }, 100);

  setTimeout(() => {
    clearInterval(anim);

    let card = getCard(type);
    save.inventory.push(card);

    resultText.innerText = `You got ${card.rarity}: ${card.name}!`;

    saveGame();
    updateUI();
  }, 1500);
}

updateUI();
</script>

</body>
</html>
